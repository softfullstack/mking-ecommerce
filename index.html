  <!-- JSON-LD Structured Data: Organization -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "MKing - Maquila King",
      "url": "https://mking.com.mx",
      "logo": "https://mking.com.mx/images/icon.png",
      "description": "Fábrica y tienda en línea de chalecos de seguridad industrial, equipo de protección personal y ropa de trabajo en México.",

        "@type": "PostalAddress",
        "addressCountry": "MX"
      },

        "https://www.facebook.com/maquilaking",
        "https://www.instagram.com/maquilaking",
        "https://www.tiktok.com/@maquilaking"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": "Spanish"
      }
    }
  </script>

  <!-- JSON-LD Structured Data: WebSite with SearchAction -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "MKing Ecommerce",
      "url": "https://mking.com.mx",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://mking.com.mx/productos?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  </script>

  <!-- JSON-LD Structured Data: Online Store -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Store",
      "name": "MKing - Tienda de Seguridad Industrial",
      "url": "https://mking.com.mx",
      "image": "https://mking.com.mx/images/logo-ceo.webp",
      "description": "Tienda en línea de chalecos de seguridad industrial, equipo de protección personal y ropa de trabajo.",
      "priceRange": "$$",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "MX"
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
        "opens": "09:00",
        "closes": "18:00"
      }
    }
  </script>

  <!-- Theme Color -->
  <meta name="theme-color" content="#d32f2f" />
